<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications - CareerTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3.0">
    <link rel="stylesheet" href="chatbot.css">
    <style>
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .stat-card:hover {
            box-shadow: var(--shadow-md);
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .stat-icon.total { background: var(--primary-subtle); color: var(--primary-color); }
        .stat-icon.pending { background: var(--warning-light); color: var(--warning-color); }
        .stat-icon.interview { background: var(--info-light); color: var(--info-color); }
        .stat-icon.offer { background: var(--success-light); color: var(--success-color); }
        .stat-icon.rejected { background: var(--danger-light); color: var(--danger-color); }
        .stat-value { font-size: 24px; font-weight: 700; color: var(--text-primary); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        .status-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .status-tab {
            padding: 10px 18px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            background: var(--surface);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
        }
        .status-tab:hover { border-color: var(--primary-color); }
        .status-tab.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .status-tab .count {
            background: rgba(0,0,0,0.1);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }
        .status-tab.active .count { background: rgba(255,255,255,0.2); }

        .applications-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }
        .application-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }
        .application-card:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .app-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .app-company-info h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .app-company-info .role {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .app-card-details {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
            font-size: 13px;
            color: var(--text-secondary);
        }
        .interview-highlight {
            background: var(--success-light);
            border-radius: var(--radius);
            padding: 10px 12px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--success-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-filter-section {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">CT</div>
                    <span class="logo-text">CareerTrack</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
                    <span>Dashboard</span>
                </a>
                <a href="applications.html" class="nav-link active" data-page="applications">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
                    <span>My Applications</span>
                </a>
                <a href="browse-jobs.html" class="nav-link" data-page="browse-jobs">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
                    <span>Browse Jobs</span>
                </a>
                <a href="add.html" class="nav-link" data-page="add">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></span>
                    <span>Add Application</span>
                </a>
                <a href="profile.html" class="nav-link" data-page="profile">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                    <span>My Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-toggle-wrapper">
                    <span class="theme-toggle-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        Dark Mode
                    </span>
                    <label class="theme-toggle">
                        <input type="checkbox" id="theme-toggle-checkbox">
                        <span class="theme-toggle-slider"></span>
                    </label>
                </div>
                <button class="logout-btn" onclick="handleLogout()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-content">
                <div class="header">
                    <div class="header-title">
                        <h1>My Applications</h1>
                        <p class="header-subtitle">Track all your job applications in one place</p>
                    </div>
                    <div class="header-action">
                        <a href="browse-jobs.html" class="btn btn-primary">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Apply to Jobs
                        </a>
                    </div>
                </div>

                <div class="stats-summary">
                    <div class="stat-card">
                        <div class="stat-icon total"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                        <div><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total Applied</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon pending"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
                        <div><div class="stat-value" id="stat-pending">0</div><div class="stat-label">In Progress</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon interview"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
                        <div><div class="stat-value" id="stat-interviews">0</div><div class="stat-label">Interviews</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon offer"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
                        <div><div class="stat-value" id="stat-offers">0</div><div class="stat-label">Offers</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon rejected"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
                        <div><div class="stat-value" id="stat-rejected">0</div><div class="stat-label">Rejected</div></div>
                    </div>
                </div>

                <div class="search-filter-section">
                    <input type="text" id="search-applications" class="search-box form-input" placeholder="Search by company or role...">
                    <select id="sort-applications" class="filter-select form-select">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="company">Company A-Z</option>
                        <option value="status">By Status</option>
                    </select>
                </div>

                <div class="status-tabs" id="status-tabs">
                    <button class="status-tab active" data-status="all">All <span class="count" id="count-all">0</span></button>
                    <button class="status-tab" data-status="Applied">Applied <span class="count" id="count-applied">0</span></button>
                    <button class="status-tab" data-status="Shortlisted">Shortlisted <span class="count" id="count-shortlisted">0</span></button>
                    <button class="status-tab" data-status="Interview">Interview <span class="count" id="count-interview">0</span></button>
                    <button class="status-tab" data-status="Offer">Offer <span class="count" id="count-offer">0</span></button>
                    <button class="status-tab" data-status="Rejected">Rejected <span class="count" id="count-rejected">0</span></button>
                </div>

                <div class="applications-grid" id="applications-grid"></div>
            </div>
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
    <script src="chatbot.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuthAndRole()) return;
            if (!checkRoleAccess()) return;
            initTheme();
            setupDynamicSidebar();
            displayUserRole();
            initializeApplicationsPage();
        });

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const checkbox = document.getElementById('theme-toggle-checkbox');
            if (checkbox) {
                checkbox.checked = savedTheme === 'dark';
                checkbox.addEventListener('change', function() {
                    const theme = this.checked ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', theme);
                    localStorage.setItem('theme', theme);
                });
            }
        }

        function initializeApplicationsPage() {
            loadApplications();
            setupFilters();
            setupSearch();
            updateStats();
        }

        function loadApplications(filterStatus = 'all', searchTerm = '') {
            const applications = getApplications();
            const grid = document.getElementById('applications-grid');
            const sortValue = document.getElementById('sort-applications')?.value || 'newest';

            let filtered = applications;
            if (filterStatus !== 'all') {
                filtered = filtered.filter(app => app.status === filterStatus);
            }
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(app =>
                    (app.company || '').toLowerCase().includes(term) ||
                    (app.jobRole || '').toLowerCase().includes(term)
                );
            }
            filtered = sortApplications(filtered, sortValue);
            updateStatusCounts(applications);

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
                        <h3>${filterStatus === 'all' ? 'No applications yet' : 'No ' + filterStatus.toLowerCase() + ' applications'}</h3>
                        <p>Start applying to jobs to track your progress</p>
                        <a href="browse-jobs.html" class="btn btn-primary">Browse Jobs</a>
                    </div>`;
                return;
            }
            grid.innerHTML = filtered.map(app => createApplicationCard(app)).join('');
        }

        function createApplicationCard(app) {
            const statusClass = (app.status || 'applied').toLowerCase();
            const hasInterview = app.status === 'Interview' && app.interviewDate;
            return `
                <a href="detail.html?id=${app.id}" class="application-card">
                    <div class="app-card-header">
                        <div class="app-company-info">
                            <h3>${app.company || 'Company'}</h3>
                            <div class="role">${app.jobRole || 'Position'}</div>
                        </div>
                        <span class="badge badge-${statusClass}">${app.status || 'Applied'}</span>
                    </div>
                    <div class="app-card-details">
                        <span>Applied: ${formatDate(app.appliedDate || app.createdAt)}</span>
                        ${app.salary ? `<span>${app.salary}</span>` : ''}
                    </div>
                    ${hasInterview ? `<div class="interview-highlight"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Interview: ${formatDate(app.interviewDate)}</div>` : ''}
                </a>`;
        }

        function sortApplications(apps, sortBy) {
            const sorted = [...apps];
            switch (sortBy) {
                case 'newest': return sorted.sort((a, b) => new Date(b.appliedDate || b.createdAt) - new Date(a.appliedDate || a.createdAt));
                case 'oldest': return sorted.sort((a, b) => new Date(a.appliedDate || a.createdAt) - new Date(b.appliedDate || b.createdAt));
                case 'company': return sorted.sort((a, b) => (a.company || '').localeCompare(b.company || ''));
                case 'status':
                    const order = ['Offer', 'Interview', 'Shortlisted', 'Applied', 'Pending', 'Rejected'];
                    return sorted.sort((a, b) => order.indexOf(a.status) - order.indexOf(b.status));
                default: return sorted;
            }
        }

        function updateStatusCounts(applications) {
            document.getElementById('count-all').textContent = applications.length;
            document.getElementById('count-applied').textContent = applications.filter(a => a.status === 'Applied').length;
            document.getElementById('count-shortlisted').textContent = applications.filter(a => a.status === 'Shortlisted').length;
            document.getElementById('count-interview').textContent = applications.filter(a => a.status === 'Interview').length;
            document.getElementById('count-offer').textContent = applications.filter(a => a.status === 'Offer').length;
            document.getElementById('count-rejected').textContent = applications.filter(a => a.status === 'Rejected').length;
        }

        function updateStats() {
            const applications = getApplications();
            document.getElementById('stat-total').textContent = applications.length;
            document.getElementById('stat-pending').textContent = applications.filter(a => ['Applied', 'Shortlisted'].includes(a.status)).length;
            document.getElementById('stat-interviews').textContent = applications.filter(a => a.status === 'Interview').length;
            document.getElementById('stat-offers').textContent = applications.filter(a => a.status === 'Offer').length;
            document.getElementById('stat-rejected').textContent = applications.filter(a => a.status === 'Rejected').length;
        }

        function setupFilters() {
            document.querySelectorAll('.status-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.status-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    loadApplications(this.getAttribute('data-status'), document.getElementById('search-applications').value);
                });
            });
            document.getElementById('sort-applications')?.addEventListener('change', function() {
                const active = document.querySelector('.status-tab.active');
                loadApplications(active?.getAttribute('data-status') || 'all', document.getElementById('search-applications').value);
            });
        }

        function setupSearch() {
            let timer;
            document.getElementById('search-applications')?.addEventListener('input', function() {
                clearTimeout(timer);
                timer = setTimeout(() => {
                    const active = document.querySelector('.status-tab.active');
                    loadApplications(active?.getAttribute('data-status') || 'all', this.value);
                }, 300);
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'Recently';
            return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function handleLogout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('user');
            localStorage.removeItem('role');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
