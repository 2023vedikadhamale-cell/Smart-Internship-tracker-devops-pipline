<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Detail - Smart Internship & Job Tracker</title>
    <link rel="stylesheet" href="style.css?v=2.0">
    <link rel="stylesheet" href="chatbot.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                        </svg>
                    </span>
                    <span class="logo-text">CareerTrack</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link" data-page="dashboard">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                    </span>
                    <span>Dashboard</span>
                </a>
                <a href="applications.html" class="nav-link" data-page="applications">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                    </span>
                    <span>My Applications</span>
                </a>
                <a href="browse-jobs.html" class="nav-link" data-page="browse-jobs">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </span>
                    <span>Browse Jobs</span>
                </a>
                <a href="add.html" class="nav-link" data-page="add">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="16"></line>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                    </span>
                    <span>Add Application</span>
                </a>
                <a href="profile.html" class="nav-link" data-page="profile">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </span>
                    <span>My Profile</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="theme-toggle-wrapper">
                    <span class="theme-toggle-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </span>
                    <label class="theme-toggle">
                        <input type="checkbox" id="theme-toggle-checkbox">
                        <span class="theme-toggle-slider"></span>
                    </label>
                    <span class="theme-toggle-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </span>
                </div>
                <button class="logout-btn">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </span>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-content">
                <div class="header">
                    <div class="header-title">
                        <h1 id="detail-company-name">Application Details</h1>
                        <p class="header-subtitle" id="detail-job-role"></p>
                    </div>
                    <div class="header-action">
                        <a href="index.html" class="btn btn-secondary">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="19" y1="12" x2="5" y2="12"></line>
                                <polyline points="12 19 5 12 12 5"></polyline>
                            </svg>
                            Back
                        </a>
                    </div>
                </div>

                <!-- Detail Card -->
                <div class="detail-container">
                    <div class="card detail-card">
                        <div class="detail-header">
                            <div class="detail-title">
                                <h2 id="detail-title"></h2>
                                <span class="badge" id="detail-badge"></span>
                            </div>
                            <div class="detail-actions">
                                <button class="btn btn-secondary-small" id="edit-btn">Edit</button>
                                <button class="btn btn-danger-small" id="delete-btn">Delete</button>
                            </div>
                        </div>

                        <div class="detail-content">
                            <div class="detail-row">
                                <div class="detail-label">Company</div>
                                <div class="detail-value" id="detail-company"></div>
                            </div>

                            <div class="detail-row">
                                <div class="detail-label">Position</div>
                                <div class="detail-value" id="detail-position"></div>
                            </div>

                            <div class="detail-row">
                                <div class="detail-label">Application Date</div>
                                <div class="detail-value" id="detail-date"></div>
                            </div>

                            <div class="detail-row">
                                <div class="detail-label">Salary</div>
                                <div class="detail-value" id="detail-salary">Not specified</div>
                            </div>

                            <div class="detail-row">
                                <div class="detail-label">Status</div>
                                <div class="detail-value" id="detail-status"></div>
                            </div>

                            <div id="interview-date-info" style="display: none;">
                                <div class="detail-row interview-date">
                                    <div class="detail-label">Interview Date</div>
                                    <div class="detail-value"></div>
                                </div>
                            </div>

                            <div class="detail-row">
                                <div class="detail-label">Notes</div>
                                <div class="detail-value" id="detail-notes">No notes added</div>
                            </div>
                        </div>

                        <!-- Status Pipeline -->
                        <div class="status-pipeline">
                            <h3>Status Pipeline</h3>
                            <div class="pipeline-stages">
                                <div class="pipeline-stage" data-status="Applied">
                                    <div class="stage-icon">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                            <polyline points="14 2 14 8 20 8"></polyline>
                                        </svg>
                                    </div>
                                    <div class="stage-label">Applied</div>
                                </div>
                                <div class="pipeline-arrow">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                        <polyline points="12 5 19 12 12 19"></polyline>
                                    </svg>
                                </div>
                                <div class="pipeline-stage" data-status="Interview">
                                    <div class="stage-icon">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                            <line x1="16" y1="2" x2="16" y2="6"></line>
                                            <line x1="8" y1="2" x2="8" y2="6"></line>
                                            <line x1="3" y1="10" x2="21" y2="10"></line>
                                        </svg>
                                    </div>
                                    <div class="stage-label">Interview</div>
                                </div>
                                <div class="pipeline-arrow">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                        <polyline points="12 5 19 12 12 19"></polyline>
                                    </svg>
                                </div>
                                <div class="pipeline-stage" data-status="Offer">
                                    <div class="stage-icon">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                                        </svg>
                                    </div>
                                    <div class="stage-label">Offer</div>
                                </div>
                            </div>
                        </div>

                        <!-- Status Update Actions -->
                        <div class="action-buttons">
                            <button class="btn btn-primary" id="next-stage-btn">Move to Next Stage</button>
                            <button class="btn btn-danger" id="reject-btn">Reject Application</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Application</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <form id="edit-form" class="modal-form">
                <div class="form-group">
                    <label for="edit-company-name">Company Name</label>
                    <input type="text" id="edit-company-name" name="companyName" required>
                </div>

                <div class="form-group">
                    <label for="edit-job-role">Job Role</label>
                    <input type="text" id="edit-job-role" name="jobRole" required>
                </div>

                <div class="form-group">
                    <label for="edit-application-date">Application Date</label>
                    <input type="date" id="edit-application-date" name="applicationDate" required>
                </div>

                <div class="form-group">
                    <label for="edit-status">Status</label>
                    <select id="edit-status" name="status" required>
                        <option value="Applied">Applied</option>
                        <option value="Interview">Interview</option>
                        <option value="Offer">Offer</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="edit-salary">Expected Salary</label>
                    <input type="text" id="edit-salary" name="salary">
                </div>

                <div class="form-group">
                    <label for="edit-notes">Notes</label>
                    <textarea id="edit-notes" name="notes" rows="4"></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-edit">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="chatbot.js"></script>
    <script>
        // Initialize theme on page load
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            const themeToggle = document.getElementById('theme-toggle-checkbox');
            if (themeToggle) {
                themeToggle.checked = savedTheme === 'dark';

                themeToggle.addEventListener('change', function() {
                    const theme = this.checked ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', theme);
                    localStorage.setItem('theme', theme);
                });
            }
        });
    </script>
</body>
</html>
