name: Smart Internship Tracker CI Pipeline

on:
  # Run pipeline on direct pushes to main
  push:
    branches:
      - main
  # Run pipeline for PRs targeting main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Run frontend white-box/unit tests with Vitest
  frontend-tests:
    name: Frontend - Vitest Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      # Fetch repository content
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure Node.js runtime and enable npm cache
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install frontend dependencies cleanly from lockfile
      - name: Install frontend dependencies
        run: |
          echo "Installing frontend dependencies..."
          npm ci

      # Execute Vitest test suite
      - name: Run Vitest tests
        run: |
          echo "Running frontend test suite (Vitest)..."
          npm run test

  # Job 2: Verify frontend production build can be generated
  frontend-build:
    name: Frontend - Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      # Fetch repository content
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure Node.js runtime and enable npm cache
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install frontend dependencies cleanly from lockfile
      - name: Install frontend dependencies
        run: |
          echo "Installing frontend dependencies..."
          npm ci

      # Build the React (Vite) app
      - name: Build frontend app
        run: |
          echo "Building frontend application..."
          npm run build

      # Confirm build artifacts exist in dist/
      - name: Verify build output
        run: |
          echo "Verifying build artifacts in dist/..."
          ls -la dist
          test -d dist
